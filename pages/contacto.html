<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style97 | Contacto</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts: Montserrat 400 y 900 (Black) -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    
    <!-- Animate.css para coherencia visual -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- VÍNCULO AL CSS: Salimos de "pages" para entrar en "css" -->
    <link rel="stylesheet" href="../css/main.css">

    <style>
        /* ESTILOS DE IDENTIDAD STYLE97 */
        body {
            background-color: #0a0a0a !important;
            font-family: 'Montserrat', sans-serif;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .navbar {
            background-color: #000 !important;
            border-bottom: 2px solid #333; 
            padding: 20px 0;
        }

        .navbar-brand {
            font-size: 2.2rem !important;
            font-weight: 900 !important;
            letter-spacing: 5px;
            color: white !important;
            text-transform: uppercase;
            text-decoration: none; /* Quitamos subrayado */
        }

        .nav-link {
            color: rgba(255,255,255,0.7) !important;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-left: 20px;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            color: white !important;
        }

        /* FORMULARIO */
        .form-control {
            background-color: transparent !important;
            border: none !important;
            border-bottom: 2px solid #333 !important;
            border-radius: 0 !important;
            color: white !important;
            padding: 15px 5px !important;
            margin-bottom: 35px;
            font-size: 1rem;
        }

        .form-control:focus {
            border-bottom-color: #ff3e3e !important;
            box-shadow: none !important;
        }

        .btn-enviar {
            background-color: white;
            color: black;
            border: none;
            padding: 18px 40px;
            font-weight: 900;
            text-transform: uppercase;
            width: 100%;
            transition: 0.3s;
        }

        .btn-enviar:hover {
            background-color: #ff3e3e;
            color: white;
        }

        .contact-title {
            font-weight: 900;
            font-size: 4rem;
            letter-spacing: -2px;
        }

        .label-style {
            font-weight: 900;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #ff3e3e;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <!-- NAVBAR: Corregida para salir a la raíz -->
    <nav class="navbar navbar-expand-lg fixed-top navbar-dark">
        <div class="container">
            <!-- Salimos con ../ para volver al index -->
            <a class="navbar-brand animate__animated animate__fadeInLeft" href="../index.html">STYLE97</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <!-- Home está afuera en la raíz -->
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    
                    <!-- Estos están en la misma carpeta "pages", no llevan ../ -->
                    <li class="nav-item"><a class="nav-link" href="tienda.html">Tienda</a></li>
                    <li class="nav-item"><a class="nav-link" href="nosotros.html">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link nav-sale" href="sale.html" style="color: #ff3e3e !important;">SALE</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container" style="margin-top: 180px; margin-bottom: 100px;">
        <div class="row g-5">
            <div class="col-md-5 mb-5 animate__animated animate__fadeIn">
                <h1 class="contact-title mb-4">HABLEMOS.</h1>
                <p class="text-secondary mt-4 fs-5">¿Tienes dudas sobre tu talle, stock o estado de tu envío?</p>
                
                <div class="mt-5">
                    <span class="label-style">EMAIL</span>
                    <p class="fs-5 fw-bold">support@style97.com</p>
                    <span class="label-style mt-4">UBICACIÓN</span>
                    <p class="fs-5 fw-bold text-uppercase">Distrito de Diseño, CP 1997<br>Buenos Aires, AR</p>
                </div>
            </div>

            <div class="col-md-7 animate__animated animate__fadeInUp">
                <form id="contactForm">
                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="NOMBRE COMPLETO" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="TU EMAIL DE CONTACTO" required>
                    </div>
                    <div class="mb-3">
                        <textarea class="form-control" rows="5" placeholder="¿CÓMO PODEMOS AYUDARTE?" required></textarea>
                    </div>
                    <button type="submit" class="btn-enviar">ENVIAR MENSAJE</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="py-5 text-center text-secondary border-top border-secondary">
        <p class="small">&copy; 2024 STYLE97 - URBAN CULTURE & DESARROLLO PROFESIONAL</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
