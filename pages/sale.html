<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style97 | SALE</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts: Montserrat 400 y 900 (Black) -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    
    <!-- Animate.css para impacto visual -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- VÍNCULO AL CSS: Salimos de "pages" para entrar en "css" -->
    <link rel="stylesheet" href="../css/main.css">

    <style>
        /* ESTILOS DE IDENTIDAD STYLE97 (UNIFICADO CON TODO EL SITIO) */
        body {
            background-color: #0a0a0a !important;
            font-family: 'Montserrat', sans-serif;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        /* NAVBAR: Logo gigante, peso 900 y línea divisoria */
        .navbar {
            background-color: #000 !important;
            border-bottom: 2px solid #333; 
            padding: 20px 0;
        }

        .navbar-brand {
            font-size: 2.2rem !important;
            font-weight: 900 !important;
            letter-spacing: 5px;
            color: white !important;
            text-transform: uppercase;
            text-decoration: none;
        }

        .nav-link {
            color: rgba(255,255,255,0.7) !important;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-left: 20px;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            color: white !important;
        }

        /* ESTILO DE CARDS PARA SALE (4 EN FILA) */
        .product-card {
            background-color: #fff;
            border: none;
            margin-bottom: 25px;
            overflow: hidden;
            border-radius: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .product-img-container {
            width: 100%;
            height: 280px; 
            overflow: hidden;
        }

        .product-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            filter: grayscale(100%);
            transition: 0.5s ease;
        }

        .product-card:hover img {
            filter: grayscale(0%);
            transform: scale(1.08);
        }

        .card-body {
            padding: 20px;
            text-align: center;
            background-color: #fff;
            color: #000;
            flex-grow: 1;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 900; 
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .card-price {
            display: block;
            margin-bottom: 15px;
            font-weight: 900;
            color: #ff3e3e; 
            font-size: 1.2rem;
        }

        /* EL BOTÓN ROJO STYLE97 */
        .btn-comprar {
            display: block;
            background-color: #ff3e3e !important;
            color: white !important;
            padding: 12px;
            text-decoration: none !important;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.85rem;
            border: none;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-comprar:hover {
            background-color: #000 !important;
            transform: translateY(-2px);
        }

        .sale-title {
            font-weight: 900;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <!-- NAVBAR IDENTITARIA -->
    <nav class="navbar navbar-expand-lg fixed-top navbar-dark">
        <div class="container">
            <!-- LOGO CORREGIDO: Salta a la raíz -->
            <a class="navbar-brand animate__animated animate__fadeInLeft" href="../index.html">STYLE97</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <!-- ENLACE HOME CORREGIDO: Salta a la raíz -->
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    
                    <!-- Enlaces internos (misma carpeta) -->
                    <li class="nav-item"><a class="nav-link" href="tienda.html">Tienda</a></li>
                    <li class="nav-item"><a class="nav-link" href="nosotros.html">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link active" href="sale.html" style="color: #ff3e3e !important;">SALE</a></li>
                    <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container" style="margin-top: 180px; margin-bottom: 80px;">
        <div class="text-center mb-5 animate__animated animate__pulse animate__infinite">
            <h1 class="sale-title display-4">FLASH <span style="color: #ff3e3e;">SALE</span></h1>
            <p class="text-secondary text-uppercase fw-bold">Streetwear Essentials - Stock Limitado</p>
        </div>
        
        <div class="row g-4"> 
            
            <!-- Producto 1 -->
            <div class="col-12 col-md-3">
                <div class="card product-card shadow-lg">
                    <div class="product-img-container">
                        <img src="../assets/img/jeans.jpg" alt="jeans-azul">
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">Urban Jeans</h5>
                        <span class="card-price">$65.00</span>
                        <a href="#" class="btn-comprar">COMPRAR</a>
                    </div>
                </div>
            </div>

            <!-- Producto 2 -->
            <div class="col-12 col-md-3">
                <div class="card product-card shadow-lg">
                    <div class="product-img-container">
                        <img src="../assets/img/buzo.webp" alt="Buzo-marron">
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">Buzo Denim</h5>
                        <span class="card-price">$42.00</span>
                        <a href="#" class="btn-comprar">COMPRAR</a>
                    </div>
                </div>
            </div>

            <!-- Producto 3 -->
            <div class="col-12 col-md-3">
                <div class="card product-card shadow-lg">
                    <div class="product-img-container">
                        <img src="../assets/img/gorra.jpg" alt="gorra-negra">
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">S97 Cap</h5>
                        <span class="card-price">$19.00</span>
                        <a href="#" class="btn-comprar">COMPRAR</a>
                    </div>
                </div>
            </div>

            <!-- Producto 4 -->
            <div class="col-12 col-md-3">
                <div class="card product-card shadow-lg">
                    <div class="product-img-container">
                        <img src="../assets/img/zapatillas.webp" alt="Urban Sneakers">
                    </div>
                    <div class="card-body">
                        <h5 class="card-title">Urban Sneakers</h5>
                        <span class="card-price">$89.00</span>
                        <a href="#" class="btn-comprar">COMPRAR</a>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-5 text-center text-secondary border-top border-secondary">
        <p class="small text-uppercase" style="letter-spacing: 2px;">&copy; 2024 STYLE97 - Streetwear Culture</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
